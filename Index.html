<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>For Riya</title>\n    <style>\n        body {\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            background: linear-gradient(to right, #ff758c, #ff7eb3);\n            color: #fff;\n            font-family: 'Arial', sans-serif;\n            overflow: hidden;\n        }\n        .heart {\n            font-size: 100px;\n            animation: bounce 1s infinite;\n            margin-bottom: 20px;\n        }\n        @keyframes bounce {\n            0%, 100% {\n                transform: translateY(0);\n            }\n            50% {\n                transform: translateY(-20px);\n            }\n        }\n        .container {\n            text-align: center;\n            padding: 20px;\n            border-radius: 10px;\n            background: rgba(255, 255, 255, 0.2);\n            backdrop-filter: blur(10px);\n        }\n        .love-letter {\n            font-size: 24px;\n            line-height: 1.6;\n        }\n        button {\n            padding: 10px 20px;\n            font-size: 18px;\n            border: none;\n            border-radius: 5px;\n            background: #ff006a;\n            color: white;\n            cursor: pointer;\n            transition: background 0.3s;\n        }\n        button:hover {\n            background: #ff3a8a;\n        }\n    </style>\n</head>\n<body>\n    <div class="container">\n        <div class="heart">❤️</div>\n        <h1>For Riya</h1>\n        <p class="love-letter">\n            My Dearest Riya,\n            <br>\n            Each moment spent with you is like a beautiful dream.\n            <br>\n            You make my heart bloom and my soul dance.\n            <br>\n            Here’s to our love, today and forever!\n            <br>\n            With all my love,\n            <br>\n            Your Ayush.\n        </p>\n        <button onclick="alert('You hold my heart!')">Click Me</button>\n    </div>\n</body>\n</html>\n
